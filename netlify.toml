[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API function must be matched BEFORE the SPA catch-all
[[redirects]]
  from = "/api/pitwall"
  to = "/.netlify/functions/pitwall"
  status = 200

# SPA fallback — everything else routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
